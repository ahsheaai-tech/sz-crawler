name: Daily SZSE Scraper

on:
  schedule:
    # 這裡設定每天凌晨 00:00 (UTC 時間) 執行，約香港時間 08:00
    - cron: '0 0 * * *'
  workflow_dispatch: # 讓你也可以手動點擊按鈕執行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run scraper
        run: python crawler.py

      - name: Commit and push if changed
        run: |
          git config --global user.email "bot@github.com"
          git config --global user.name "DataBot"
          git add data.csv
          git commit -m "Auto-update data" || exit 0
          git push
